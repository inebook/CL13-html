<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>背景画像に文字を重ねる</title>
</head>
<body>

<div style="
    position: relative;
    width: 600px;
    height: 400px;
">

    <img src="bg0.png" style="width:100%; height:100%;">

    <div style="
        position: absolute;
        left: 20px;
        top: 20px;
        color: #D13D4E;
        font-size: 16px;
        background: rgba(255,255,255,0.5);
        padding: 8px;
        font-family: sans-serif;
        font-weight: bold;
        
    ">
         ぽかぽか陽気の穏やかな朝<br>
         花畑では、蝶々がのんびり飛んでいます 
    </div>

</div>

</body>
</html>
